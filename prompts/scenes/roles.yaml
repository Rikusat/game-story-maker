# ============================================================
# prompts/scenes/roles.yaml
#
# 17ページ構成の役割定義。
# ここを編集するだけで各ページのトーン・指示が変わる。
# コードは触らなくてよい。
# ============================================================

pages:
  - index: 0
    type: op
    role: OP
    desc: 物語の幕開け。世界観と主人公を鮮やかに描写し、読者を引き込む導入
    hint: 情景描写・主人公の感情・世界の空気感から入り、一気に引き込む

  - index: 1
    type: text
    role: 展開①
    desc: 導入からの自然な流れで物語を動かす
    hint: 新たな人物・場所・出来事を1つ加えて物語を前進させる

  - index: 2
    type: choice
    role: 分岐①
    desc: 最初の選択。物語の方向性を決める重要な岐路
    hint: どちらを選んでも物語が豊かになる対等な2択にする

  - index: 3
    type: text
    role: 展開②
    desc: 選択の結果を自然に反映させ物語を深める
    hint: 前の選択が物語にどう影響したかを冒頭で描写する

  - index: 4
    type: choice
    role: 分岐②
    desc: 緊張感が高まる第2の選択
    hint: 感情的な選択肢。どちらも正解に見える設計

  - index: 5
    type: text
    role: 展開③
    desc: 物語の中盤。伏線を積み重ねる
    hint: 後半への布石を打ちつつ、キャラクターの内面を掘り下げる

  - index: 6
    type: choice
    role: 分岐③
    desc: 物語の転換点となる選択
    hint: この選択で物語のトーンが変わる分岐にする

  - index: 7
    type: text
    role: 展開④
    desc: 中盤の山場へ向かう
    hint: 緊張感を高め、読者の期待を最大化する

  - index: 8
    type: choice
    role: 分岐④
    desc: 中盤の山場。最も重要な選択のひとつ
    hint: 選択の重みを最大にする。どちらも代償がある設計

  - index: 9
    type: text
    role: 展開⑤
    desc: 山場を越えた後の余韻と新たな展開
    hint: テンションを少し落としつつ、次の盛り上がりへの準備をする

  - index: 10
    type: choice
    role: 分岐⑤
    desc: 後半戦の幕開けとなる選択
    hint: ここからクライマックスへ向かう方向性を決める

  - index: 11
    type: text
    role: 展開⑥
    desc: クライマックスへの助走
    hint: 伏線を回収し始め、物語を収束させる準備をする

  - index: 12
    type: choice
    role: 分岐⑥
    desc: クライマックス直前の選択
    hint: これまでの選択の積み重ねが感じられる分岐にする

  - index: 13
    type: text
    role: 展開⑦
    desc: クライマックス
    hint: 物語の感情が最高潮に達する場面。読者が驚く展開を入れる

  - index: 14
    type: choice
    role: 分岐⑦
    desc: 最後の選択。結末を決定する
    hint: これまでの全選択を踏まえた、最も重みのある分岐

  - index: 15
    type: summary
    role: まとめ
    desc: EDへの橋渡し。これまでの選択の意味を噛み締める場面
    hint: 選択の積み重ねを振り返りながら、静かに結末へ向かう

  - index: 16
    type: ending
    role: ED
    desc: 物語の結末。すべての選択が収束する
    hint: 余韻を残す締めくくり。最後は「了」で終える
