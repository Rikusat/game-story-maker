# ============================================================
# prompts/scenes/format.yaml
#
# 出力フォーマットと文字数設定。
# 選択肢の形式・文字数制限をここで一括管理する。
# ============================================================

# 通常シーン（起・承・転）の設定
normal_scene:
  min_chars: 280
  max_chars: 350
  instructions:
    - 情景・感情・対話を豊かに織り交ぜ、読者を引き込む
    - 直前の選択があれば、その結果を冒頭で自然に物語に反映する
    - 最後は自然な形でこのシーンならではの分岐点に誘導する

# 最終シーン（結）の設定
ending_scene:
  min_chars: 350
  max_chars: 450
  instructions:
    - プレイヤーの選択の積み重ねが意味を持つ締めくくりにする
    - これまでのすべての選択を踏まえた感動的な結末を書く

# 選択肢の出力フォーマット
choices_format:
  delimiter_start: "===CHOICES==="
  delimiter_end: "===END==="
  # choice_a / choice_b のラベル生成ルール
  choice_label_max_chars: 40
  choice_label_rule: この場面でキャラクターが実際に取る具体的な行動や発言

# タイトル生成
title:
  max_chars: 15
  context_chars: 500   # 物語の何文字目までをタイトル生成に使うか
